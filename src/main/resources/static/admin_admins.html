<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Administrar Administradores - AppUnTN</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="icon" href="img/logoicono.ico" type="image/x-icon">
  <style>
    body {
      background: #f8f9fa;
    }
    .filtros input {
      width: 160px;
    }
    .table td, .table th {
      vertical-align: middle;
    }
    .actions-btn {
      display: flex;
      gap: 5px;
      justify-content: center;
    }
    @media (max-width: 768px) {
      .filtros input {
        width: 100%;
      }
      .filtros {
        justify-content: flex-start !important;
      }
    }
  </style>
</head>
<body class="p-4">

<script>
  const token = localStorage.getItem("jwt");
  if (!token) {
    alert("Token no encontrado. Redirigiendo al login...");
    window.location.href = "/login.html";
  }

  function getPayloadFromToken(token) {
    try {
      return JSON.parse(atob(token.split('.')[1]));
    } catch (e) {
      console.error("Error decodificando token:", e);
      return null;
    }
  }

  const payload = getPayloadFromToken(token);
  const username = payload?.sub;
  const role = payload?.role;
</script>

<div class="container">
  <h2 class="mb-4 text-center">Gestión de Administradores</h2>

  <!-- Botón y filtros en la misma fila -->
  <div class="d-flex justify-content-between flex-wrap align-items-end gap-2 mb-3">
    <!-- Botón agregar -->
    <div>
      <a href="register.html?role=ADMIN" class="btn btn-primary mb-2">Agregar nuevo administrador</a>
    </div>

    <!-- FILTROS: todos los campos visibles -->
    <div class="d-flex flex-wrap gap-2 filtros">
      <div class="d-flex flex-column">
        <label class="mb-1">Usuario</label>
        <input type="text" id="filtroUsername" class="form-control form-control-sm" placeholder="Filtrar por usuario">
      </div>
      <div class="d-flex flex-column">
        <label class="mb-1">Nombre</label>
        <input type="text" id="filtroNombre" class="form-control form-control-sm" placeholder="Filtrar por nombre">
      </div>
      <div class="d-flex flex-column">
        <label class="mb-1">Email</label>
        <input type="text" id="filtroEmail" class="form-control form-control-sm" placeholder="Filtrar por email">
      </div>
    </div>
  </div>

  <!-- TABLA DE ADMINISTRADORES -->
  <div class="table-responsive">
    <table class="table table-bordered table-hover text-center">
      <thead class="table-light">
      <tr>
        <th>Usuario</th>
        <th>Nombre</th>
        <th>Email</th>
        <th>Acciones</th>
      </tr>
      </thead>
      <tbody id="adminTable"></tbody>
    </table>
  </div>

  <div class="mt-4 text-center">
    <button class="btn btn-secondary" onclick="window.location.href='/profile.html'">
      Volver al perfil
    </button>
  </div>
</div>

<script>
  let admins = [];

  // Cargar administradores
  fetch("/api/users/getAllUsers", {
    headers: { "Authorization": "Bearer " + token }
  })
  .then(res => {
    if (!res.ok) throw new Error("Acceso no autorizado");
    return res.json();
  })
  .then(users => {
    admins = users.filter(u => u.role === "ADMIN" || u.role === "ROLE_ADMIN");
    mostrarAdmins(admins);
  })
  .catch(err => {
    console.error("Error cargando administradores:", err);
    if (err.message.includes("Acceso no autorizado")) {
      alert("No estás autorizado para acceder a esta función.");
    } else {
      alert("Ocurrió un error cargando administradores.");
    }
  });

  // Mostrar tabla
  function mostrarAdmins(lista) {
    const table = document.getElementById("adminTable");
    table.innerHTML = "";
    lista.forEach(user => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${user.username}</td>
        <td>${user.name} ${user.lastname}</td>
        <td>${user.mail}</td>
        <td class="actions-btn">
          <button class="btn btn-danger btn-sm" onclick="deleteUser('${user.username}')">
            Eliminar
          </button>
        </td>
      `;
      table.appendChild(tr);
    });
  }

  // FILTRO DINÁMICO POR TODOS LOS CAMPOS
  function filtrarTodos() {
    const valorUsername = document.getElementById("filtroUsername").value.toLowerCase();
    const valorNombre = document.getElementById("filtroNombre").value.toLowerCase();
    const valorEmail = document.getElementById("filtroEmail").value.toLowerCase();

    const filtrados = admins.filter(u => {
      const fullName = `${u.name} ${u.lastname}`.toLowerCase();
      return u.username.toLowerCase().includes(valorUsername)
          && fullName.includes(valorNombre)
          && u.mail.toLowerCase().includes(valorEmail);
    });

    mostrarAdmins(filtrados);
  }

  document.getElementById("filtroUsername").addEventListener("input", filtrarTodos);
  document.getElementById("filtroNombre").addEventListener("input", filtrarTodos);
  document.getElementById("filtroEmail").addEventListener("input", filtrarTodos);

  // ELIMINAR ADMIN
  function deleteUser(username) {
    if (!confirm(`¿Estás seguro que querés eliminar al administrador ${username}?`)) return;

    fetch("/api/users/deleteUser", {
      method: "DELETE",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
      },
      body: JSON.stringify({ username })
    })
    .then(res => {
      if (!res.ok) throw new Error("Error eliminando administrador");
      return res.text();
    })
    .then(msg => {
      alert(msg);
      location.reload();
    })
    .catch(() => alert("Error eliminando el administrador."));
  }
</script>

</body>
</html>
