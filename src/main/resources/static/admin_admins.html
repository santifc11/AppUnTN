<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Administrar Administradores - AppUnTN</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="icon" href="img/logoicono.ico" type="image/x-icon">
  <style>
    body {
      background: #f8f9fa;
    }
    .filtros input {
      width: 160px;
    }
    .table td, .table th {
      vertical-align: middle;
    }
    .actions-btn {
      display: flex;
      gap: 5px;
      justify-content: center;
    }
    @media (max-width: 768px) {
      .filtros input {
        width: 100%;
      }
      .filtros {
        justify-content: flex-start !important;
      }
    }
  </style>
</head>
<body class="p-4">

<script>
  const token = localStorage.getItem("jwt");
  if (!token) {
    alert("Token no encontrado. Redirigiendo al login...");
    window.location.href = "/login.html";
  }

  function getPayloadFromToken(token) {
    try {
      return JSON.parse(atob(token.split('.')[1]));
    } catch (e) {
      console.error("Error decodificando token:", e);
      return null;
    }
  }

  const payload = getPayloadFromToken(token);
  // username actual en minúsculas para comparaciones seguras
  const username = (payload?.sub || "").toLowerCase();
  const role = payload?.role;
</script>

<div class="container">
  <h2 class="mb-4 text-center">Gestión de Administradores</h2>

  <!-- Botón y filtros en la misma fila -->
  <div class="d-flex justify-content-between flex-wrap align-items-end gap-2 mb-3">
    <!-- Botón agregar -->
    <div>
      <a href="register.html?role=ADMIN" class="btn btn-primary mb-2">Agregar nuevo administrador</a>
    </div>

    <!-- FILTROS: todos los campos visibles -->
    <div class="d-flex flex-wrap gap-2 filtros">
      <div class="d-flex flex-column">
        <label class="mb-1">Usuario</label>
        <input type="text" id="filtroUsername" class="form-control form-control-sm" placeholder="Filtrar por usuario">
      </div>
      <div class="d-flex flex-column">
        <label class="mb-1">Nombre</label>
        <input type="text" id="filtroNombre" class="form-control form-control-sm" placeholder="Filtrar por nombre">
      </div>
      <div class="d-flex flex-column">
        <label class="mb-1">Email</label>
        <input type="text" id="filtroEmail" class="form-control form-control-sm" placeholder="Filtrar por email">
      </div>
    </div>
  </div>

  <!-- TABLA DE ADMINISTRADORES -->
  <div class="table-responsive">
    <table class="table table-bordered table-hover text-center">
      <thead class="table-light">
      <tr>
        <th>Usuario</th>
        <th>Nombre</th>
        <th>Email</th>
        <th>Acciones</th>
      </tr>
      </thead>
      <tbody id="adminTable"></tbody>
    </table>
  </div>

  <div class="mt-4 text-center">
    <button class="btn btn-secondary" onclick="window.location.href='/profile.html'">
      Volver al perfil
    </button>
  </div>
</div>

<script>
  let admins = [];

  // Cargar administradores
  fetch("/api/users/getAllUsers", {
    headers: { "Authorization": "Bearer " + token }
  })
  .then(res => {
    if (!res.ok) throw new Error("Acceso no autorizado");
    return res.json();
  })
  .then(users => {
    // Normalizamos roles como venían en tu versión original
    admins = users.filter(u => u.role === "ADMIN" || u.role === "ROLE_ADMIN");
    mostrarAdmins(admins);
  })
  .catch(err => {
    console.error("Error cargando administradores:", err);
    if (err.message.includes("Acceso no autorizado")) {
      alert("No estás autorizado para acceder a esta función.");
    } else {
      alert("Ocurrió un error cargando administradores.");
    }
  });

  // Mostrar tabla
  function mostrarAdmins(lista) {
    const table = document.getElementById("adminTable");
    table.innerHTML = "";
    lista.forEach(user => {
      const tr = document.createElement("tr");

      // Comparaciones en minúsculas para evitar problemas de mayúsculas/minúsculas
      const userLower = (user.username || "").toLowerCase();

      // REGLA solicitada:
      // - cualquier admin puede eliminar a otros admins
      // - NO puede eliminarse a sí mismo
      // - NO puede eliminar al admin raíz "admin0" (sin importar mayúsculas)
      const puedeEliminar = (userLower !== username) && (userLower !== "admin0");

      tr.innerHTML = `
        <td>${user.username}</td>
        <td>${user.name || ''} ${user.lastname || ''}</td>
        <td>${user.mail || ''}</td>
        <td class="actions-btn">
          ${
            puedeEliminar
              ? `<button class="btn btn-danger btn-sm" onclick="deleteUser('${escapeForOnclick(user.username)}')">Eliminar</button>`
              : `<span class="text-muted">No disponible</span>`
          }
        </td>
      `;
      table.appendChild(tr);
    });
  }

  // pequeña función para escapar comillas dentro de los usernames al inyectarlos en onclick
  function escapeForOnclick(s) {
    if (s == null) return '';
    return s.replace(/'/g, "\\'").replace(/"/g, '\\"');
  }

  // FILTRO DINÁMICO POR TODOS LOS CAMPOS
  function filtrarTodos() {
    const valorUsername = document.getElementById("filtroUsername").value.toLowerCase();
    const valorNombre = document.getElementById("filtroNombre").value.toLowerCase();
    const valorEmail = document.getElementById("filtroEmail").value.toLowerCase();

    const filtrados = admins.filter(u => {
      const fullName = `${u.name || ''} ${u.lastname || ''}`.toLowerCase();
      return (u.username || '').toLowerCase().includes(valorUsername)
          && fullName.includes(valorNombre)
          && (u.mail || '').toLowerCase().includes(valorEmail);
    });

    mostrarAdmins(filtrados);
  }

  document.getElementById("filtroUsername").addEventListener("input", filtrarTodos);
  document.getElementById("filtroNombre").addEventListener("input", filtrarTodos);
  document.getElementById("filtroEmail").addEventListener("input", filtrarTodos);

  // ELIMINAR ADMIN
  function deleteUser(usernameToDeleteRaw) {
    // defensas: trim y minúsculas
    const usernameToDelete = (usernameToDeleteRaw || "").toLowerCase();

    // Validaciones extras por seguridad
    if (usernameToDelete === "admin0") {
      alert("No se puede eliminar al administrador raíz (admin0).");
      return;
    }
    if (usernameToDelete === username) {
      alert("No podés eliminar tu propio usuario.");
      return;
    }

    if (!confirm(`¿Estás seguro que querés eliminar al administrador ${usernameToDeleteRaw}?`)) return;

    fetch("/api/users/deleteUser", {
      method: "DELETE",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
      },
      body: JSON.stringify({ username: usernameToDeleteRaw })
    })
    .then(async res => {
      if (!res.ok) {
        const text = await res.text().catch(()=>null);
        throw new Error(text || "Error eliminando administrador");
      }
      return res.text();
    })
    .then(msg => {
      alert(msg || "Administrador eliminado correctamente.");
      // Actualizo la lista en memoria y la tabla sin recargar la página
      admins = admins.filter(a => (a.username || "").toLowerCase() !== usernameToDelete);
      mostrarAdmins(admins);
    })
    .catch(err => {
      console.error("Error en deleteUser:", err);
      alert(err.message || "Error eliminando el administrador.");
    });
  }
</script>

</body>
</html>
