<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Administrar Administradores - AppUnTN</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="icon" href="img/logoicono.ico" type="image/x-icon">
</head>
<body class="bg-light p-4">
<script>
  const token = localStorage.getItem("jwt");

  if (!token) {
    alert("Token no encontrado. Redirigiendo al login...");
    window.location.href = "/login.html";
  }

  function getPayloadFromToken(token) {
    try {
      return JSON.parse(atob(token.split('.')[1]));
    } catch (e) {
      console.error("Error decodificando token:", e);
      return null;
    }
  }

  const payload = getPayloadFromToken(token);
  const username = payload?.sub;
  const role = payload?.role;
</script>

<div class="container">
  <h2 class="mb-4">Gestión de Administradores</h2>

  <!-- Botón para agregar nuevo admin -->
  <div class="mb-3">
    <a href="register.html?role=ADMIN" class="btn btn-primary">Agregar nuevo administrador</a>
  </div>

  <table class="table table-bordered table-hover">
    <thead class="table-light">
    <tr>
      <th>Usuario</th>
      <th>Nombre</th>
      <th>Email</th>
      <th>Acciones</th>
    </tr>
    </thead>
    <tbody id="adminTable"></tbody>
  </table>

  <div class="mt-4 text-center">
    <button class="btn btn-secondary" onclick="window.location.href='/profile.html'">
      Volver al perfil
    </button>
  </div>

</div>

<script>
  fetch("/api/users/getAllUsers", {
    headers: {
      "Authorization": "Bearer " + token
    }
  })
    .then(res => {
      if (!res.ok) throw new Error("Acceso no autorizado");
      return res.json();
    })
    .then(users => {
      const table = document.getElementById("adminTable");
      users
        .filter(u => u.role === "ADMIN" || u.role === "ROLE_ADMIN")
        .forEach(user => {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${user.username}</td>
            <td>${user.name} ${user.lastname}</td>
            <td>${user.mail}</td>
            <td>
              <button class="btn btn-danger btn-sm" onclick="deleteUser('${user.username}')">
                Eliminar
              </button>
            </td>
          `;
          table.appendChild(tr);
        });
    })
    .catch(err => {
  console.error("Error cargando administradores:", err);

  // Mostramos el código exacto de error, si lo hay
  if (err.message.includes("Acceso no autorizado")) {
    alert("No estás autorizado para acceder a esta función.");
  } else {
    alert("Ocurrió un error cargando administradores.");
  }

  // NO redirijas al login si el token existe
  // window.location.href = "/login.html";
});

  function deleteUser(username) {
    if (!confirm(`¿Estás seguro que querés eliminar al administrador ${username}?`)) return;

    fetch("/api/users/deleteUser", {
      method: "DELETE",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
      },
      body: JSON.stringify({ username })
    })
      .then(res => {
        if (!res.ok) throw new Error("Error eliminando administrador");
        return res.text();
      })
      .then(msg => {
        alert(msg);
        location.reload();
      })
      .catch(() => alert("Error eliminando el administrador."));
  }
</script>

</body>
</html>
