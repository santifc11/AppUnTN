<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Home - AppUnTN</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
  <h1 class="mb-4">Bienvenido/a <span id="username"></span>!</h1>
  <p>Este es tu perfil de AppUnTN</p>
  <div id="userDetails"></div>
</div>

<script>
  const token = localStorage.getItem("jwt");

  if (!token) {
    window.location.href = "/login.html";
  }

  fetch("/api/users/me", {
  headers: {
    "Authorization": "Bearer " + localStorage.getItem("jwt")
  }
})

  .then(res => {
    if (!res.ok) throw new Error("No autorizado");
    return res.json();
  })
  .then(data => {
    document.getElementById("username").textContent = data.username;
    document.getElementById("userDetails").innerHTML = `
      <ul class="list-group">
        <li class="list-group-item"><strong>Nombre:</strong> ${data.name}</li>
        <li class="list-group-item"><strong>Apellido:</strong> ${data.lastname}</li>
        <li class="list-group-item"><strong>Email:</strong> ${data.mail}</li>
        <li class="list-group-item"><strong>Rol:</strong> ${data.role}</li>
      </ul>
    `;
  })
  .catch(() => {
    localStorage.removeItem("jwt");
    window.location.href = "/login.html";
  });
</script>
</body>
</html>
