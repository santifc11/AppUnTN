<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Registro - AppUnTN</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f8f9fa;
    }
  </style>
</head>
<body>
<div class="container mt-5">
  <h2 class="mb-4 text-center">Registro de Usuario</h2>
  <div id="message"></div>
  <form id="registerForm">
    <div class="mb-3">
      <label class="form-label">Nombre</label>
      <input type="text" name="name" class="form-control" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Apellido</label>
      <input type="text" name="lastname" class="form-control" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" name="mail" class="form-control" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Usuario</label>
      <input type="text" name="username" class="form-control" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Contraseña</label>
      <input type="password" name="password" class="form-control" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Ciudad</label>
      <input type="text" name="city" class="form-control">
    </div>
    <div class="mb-3">
      <label class="form-label">Sobre vos</label>
      <textarea name="about" class="form-control" rows="3"></textarea>
    </div>
    <div class="mb-3">
      <label class="form-label">Rol</label>
      <select name="role" class="form-select" required>
        <option value="STUDENT">Alumno</option>
        <option value="PROFESSOR">Profesor</option>
        <option value="ADMIN">Administrador</option>
      </select>
    </div>
    <button type="submit" class="btn btn-primary w-100">Registrarse</button>
  </form>
</div>

<script>
  document.getElementById("registerForm").addEventListener("submit", async function (event) {
    event.preventDefault();

    const formData = new FormData(this);
    const data = Object.fromEntries(formData.entries());

    try {
      const response = await fetch("/api/users/register", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
      });

      if (response.ok) {
        document.getElementById("message").innerHTML =
          '<div class="alert alert-success">Registro exitoso. Redirigiendo a inicio de sesión...</div>';
        setTimeout(() => window.location.href = "/login.html", 2000);
      } else {
        const error = await response.text();
        document.getElementById("message").innerHTML =
          `<div class="alert alert-danger">Error al registrarse: ${error}</div>`;
      }

    } catch (e) {
      console.error("Error inesperado:", e);
      document.getElementById("message").innerHTML =
        '<div class="alert alert-danger">Error inesperado. Intentá nuevamente.</div>';
    }
  });
</script>

</body>
</html>
