<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ABM Materias - AppUnTN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h1 class="mb-4 text-center">Administrar Materias</h1>

    <!-- Botón para volver al perfil -->
    <div class="mb-4 text-center">
        <a href="/index_usuario_perfil.html" class="btn btn-outline-primary">Volver al perfil</a>
    </div>

    <!-- Botón global para agregar materia -->
    <div class="mb-3 text-end">
        <input type="text" id="nuevaMateria" placeholder="Nueva materia" class="form-control d-inline-block w-auto me-2">
        <button class="btn btn-success" onclick="agregarMateriaGlobal()">Agregar Materia</button>
    </div>

    <!-- Tabla de materias -->
    <div class="card shadow p-3">
        <table class="table table-striped align-middle">
            <thead class="table-dark">
            <tr>
                <th>Materia</th>
                <th class="text-center">Acciones</th>
            </tr>
            </thead>
            <tbody id="tablaMaterias"></tbody>
        </table>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        cargarMaterias();
    });

    function cargarMaterias() {
        fetch('/api/subjects/all')
            .then(response => {
                if (!response.ok) throw new Error("Error al obtener las materias");
                return response.json();
            })
            .then(subjects => {
                const tbody = document.getElementById('tablaMaterias');
                tbody.innerHTML = '';

                subjects.forEach(materia => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${materia.replaceAll('_', ' ')}</td>
                        <td class="text-center">
                            <button class="btn btn-sm btn-primary me-2" onclick="modificarMateria('${materia}')">Modificar</button>
                            <button class="btn btn-sm btn-danger" onclick="eliminarMateria('${materia}')">Eliminar</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            })
            .catch(error => {
                console.error(error);
                alert("No se pudieron cargar las materias.");
            });
    }

    // Función para el botón global
    function agregarMateriaGlobal() {
        const nuevaMateria = document.getElementById('nuevaMateria').value.trim();
        if (!nuevaMateria) return alert("Ingresá el nombre de la materia");
        alert("Aquí harías el POST para agregar la materia: " + nuevaMateria);
        document.getElementById('nuevaMateria').value = '';
        // después de agregar al backend, podés recargar la tabla:
        // cargarMaterias();
    }

    // Funciones por fila
    function modificarMateria(materia) {
        alert("Aquí harías el PUT para modificar: " + materia);
    }

    function eliminarMateria(materia) {
        alert("Aquí harías el DELETE para eliminar: " + materia);
    }
</script>

</body>
</html>
