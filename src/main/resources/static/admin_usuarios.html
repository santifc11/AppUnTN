<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Administrar Usuarios - AppUnTN</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="icon" href="img/logoicono.ico" type="image/x-icon">
</head>
<body class="bg-light p-4">
<div class="container">
  <h2 class="mb-4">Gestión de Usuarios</h2>
  <table class="table table-bordered table-hover">
    <thead class="table-light">
    <tr>
      <th>Usuario</th>
      <th>Nombre</th>
      <th>Email</th>
      <th>Rol</th>
      <th>Acciones</th>
    </tr>
    </thead>
    <tbody id="usuariosTable">
    </tbody>
  </table>
  <div class="mt-4 text-center">
    <button class="btn btn-secondary" onclick="window.location.href='/profile.html'">
      Volver al perfil
    </button>
  </div>
</div>

<script>
  fetch("/api/users/getAllUsers", {
    headers: {
      "Authorization": "Bearer " + localStorage.getItem("jwt")
    }
  })
  .then(res => res.json())
  .then(users => {
    const table = document.getElementById("usuariosTable");
    users
      .filter(u => u.role === "STUDENT" || u.role === "PROFESSOR")
      .forEach(user => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${user.username}</td>
          <td>${user.name} ${user.lastname}</td>
          <td>${user.mail}</td>
          <td>${user.role}</td>
          <td>
            <button class="btn btn-danger btn-sm" onclick="deleteUser('${user.username}')">
              Eliminar
            </button>
          </td>
        `;
        table.appendChild(tr);
      });
  });

  function deleteUser(username) {
    if (!confirm(`¿Estás seguro que querés eliminar a ${username}? Esta acción es irreversible.`)) return;

    fetch("/api/users/deleteUser", {
      method: "DELETE",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + localStorage.getItem("jwt")
      },
      body: JSON.stringify({ username })
    })
    .then(res => res.text())
    .then(msg => {
      alert(msg);
      location.reload();
    })
    .catch(() => alert("Error eliminando el usuario."));
  }
</script>
</body>
</html>
